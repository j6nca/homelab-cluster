# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app matter-server
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  dependsOn: []
  interval: 15m
  values:
    controllers:
      matter-server:
        containers:
          app:
            image:
              repository: ghcr.io/home-assistant-libs/python-matter-server
              tag: 6.2.2
            env:
              TZ: America/Toronto
            ports:
              - containerPort: &port 5580
                name: api
                protocol: TCP

    defaultPodOptions:
      # Matter commissioning and device communication rely on mDNS and
      # (for Thread devices) IPv6 on the LAN, so the server must sit on
      # the host network rather than the pod overlay.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

    service:
      app:
        ports:
          api:
            port: *port

    persistence:
      data:
        globalMounts:
          - path: /data
            readOnly: false
        type: persistentVolumeClaim
        storageClass: longhorn
        size: 1Gi
        accessMode: ReadWriteOnce
