# yaml-language-server: $schema=https://ctrl-research.github.io/k8s-schemas/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: yopass
  namespace: flux-system
spec:
  targetNamespace: yopass
  commonMetadata:
    labels:
      service: yopass
  interval: 5m
  path: ./apps/base/tools/yopass/release
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
