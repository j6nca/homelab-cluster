# yaml-language-server: $schema=https://ctrl-research.github.io/k8s-schemas/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: volsync
  namespace: observability
spec:
  instanceSelector:
    matchLabels:
      dashboards: homelab
  folderRef: storage
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  grafanaCom:
    id: 21356
