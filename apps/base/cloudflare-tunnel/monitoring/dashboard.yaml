# yaml-language-server: $schema=https://ctrl-research.github.io/k8s-schemas/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: cloudflare
spec:
  instanceSelector:
    matchLabels:
      dashboards: homelab
  folderRef: network
  datasources:
    - datasourceName: VictoriaMetrics
      inputName: __expr__Prometheus
  grafanaCom:
    id: 23115
