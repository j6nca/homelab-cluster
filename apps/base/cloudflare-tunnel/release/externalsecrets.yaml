# yaml-language-server: $schema=https://ctrl-research.github.io/k8s-schemas/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-tunnel-credentials
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    creationPolicy: Owner
    # this is how the Kind=Secret will look like
    template:
      data:
      # multiline string
        credentials.json: |-
          {
            "AccountTag": "{{ .account_id | toString }}",
            "TunnelID": "{{ .tunnel_id | toString }}",
            "TunnelSecret": "{{ .tunnel_secret | toString }}"
          }

  data:
  - secretKey: account_id
    remoteRef:
      key: cloudflared-tunnel-credentials
      property: account-id
  - secretKey: tunnel_id
    remoteRef:
      key: cloudflared-tunnel-credentials
      property: tunnel-id
  - secretKey: tunnel_secret
    remoteRef:
      key: cloudflared-tunnel-credentials
      property: tunnel-secret
