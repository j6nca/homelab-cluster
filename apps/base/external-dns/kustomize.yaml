# yaml-language-server: $schema=https://ctrl-research.github.io/k8s-schemas/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app external-dns
  namespace: flux-system
spec:
  targetNamespace: network
  commonMetadata:
    labels:
      service: *app
  dependsOn:
    - name: external-secrets-resources
  interval: 5m
  path: ./apps/base/external-dns/release
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
