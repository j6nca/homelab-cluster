apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app qbittorrent
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  dependsOn: []
  interval: 15m
  values:
    controllers:
      qbittorrent:
        containers:
          app:
            image:
              repository: linuxserver/qbittorrent
              tag: 5.1.4
            env:
              TZ: America/Toronto
              WEBUI_PORT: &port 8080
              TORRENTING_PORT:
                valueFrom:
                    secretKeyRef:
                      name: "gluetun-secret"
                      key: FIREWALL_VPN_INPUT_PORTS
            ports:
              - containerPort: *port
                name: http
                protocol: TCP
        initContainers:
          vpn:
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.40.3
            envFrom:
              - secretRef:
                  name: gluetun-secret
            securityContext:
              capabilities:
                add: ["NET_ADMIN"]
                # privileged: true
            # Keep gluetun running for the duration of the pod
            restartPolicy: Always
          ping:
            image:
              repository: busybox
              tag: latest
            command:
              - sh
              - -c
              - |
                while ! ping -c 1 8.8.8.8; do
                echo "Ping failed, retrying in 5"
                sleep 5
                done
                echo "ping succesfull, exiting"

    # defaultPodOptions:
    #   securityContext:
    #     runAsNonRoot: true
    #     runAsUser: 1000
    #     runAsGroup: 100
    #     fsGroup: 100
    #     fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        ports:
          http:
            port: *port
      
    persistence:
      config:
        globalMounts:
          - path: /config
            readOnly: false
        type: persistentVolumeClaim
        storageClass: longhorn
        size: 500Mi
        accessMode: ReadWriteOnce
      media:
        type: nfs
        server: mimir.home
        path: /var/nfs/shared/MEDIA
        globalMounts:
          - subPath: data/torrents
            path: /data/torrents
      gluetun:
        type: emptyDir
      tmp:
        type: emptyDir
