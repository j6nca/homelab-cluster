apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: media-postgres
spec:
  instances: 1
  managed:
    roles:
      - name: seerr
        login: true
        passwordSecret:
          name: seerr-postgres
      - name: jellystat
        login: true
        passwordSecret:
          name: jellystat-postgres
      - name: sonarr
        login: true
        passwordSecret:
          name: sonarr-postgres
      - name: radarr
        login: true
        passwordSecret:
          name: radarr-postgres
      - name: prowlarr
        login: true
        passwordSecret:
          name: prowlarr-postgres
  storage:
    storageClass: longhorn
    size: 15Gi
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: seerr-postgres
spec:
  cluster: 
    name: media-postgres
  name: &app seerr
  owner: *app
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: jellystat-postgres
spec:
  cluster: 
    name: media-postgres
  name: &app jellystat
  owner: *app
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: sonarr-postgres
spec:
  cluster: 
    name: media-postgres
  name: &app sonarr
  owner: *app
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: radarr-postgres
spec:
  cluster: 
    name: media-postgres
  name: &app radarr
  owner: *app
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: prowlarr-postgres
spec:
  cluster: 
    name: media-postgres
  name: &app prowlarr
  owner: *app
---
