apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app seerr
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  dependsOn: []
  interval: 15m
  values:
    controllers:
      sonarr:
        containers:
          app:
            image:
              repository: ghcr.io/seerr-team/seerr
              tag: v3.1.0
            env:
              TZ: America/Toronto
              PORT: &port 5055
              DB_TYPE: "postgres"
              DB_HOST: "media-postgres-rw"
              DB_PORT: "5432"
              DB_USER: "{{ .Release.Name }}"
              DB_PASS:
                valueFrom:
                  secretKeyRef:
                    name: "{{ .Release.Name }}-postgres"
                    key: password
              DB_NAME: "{{ .Release.Name }}"
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            ports:
              - containerPort: *port
                name: http
                protocol: TCP

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        ports:
          http:
            port: *port
      
    persistence:
      config:
        globalMounts:
          - path: /app/config
            readOnly: false
        type: persistentVolumeClaim
        storageClass: longhorn
        size: 500Mi
        accessMode: ReadWriteOnce
      media:
        type: nfs
        server: mimir.home
        path: /var/nfs/shared/MEDIA
        globalMounts:
          - subPath: data/media
            path: /data/media
      tmp:
        type: emptyDir
