# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sabnzbd
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 15m
  values:
    controllers:
      sabnzbd:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: linuxserver/sabnzbd
              tag: 4.5.5
            env:
              TZ: America/Toronto
              SABNZBD__PORT: &port 8080
              SABNZBD__HOST_WHITELIST_ENTRIES: >-
                "{{ .Release.Name }}",
                "{{ .Release.Name }}.downloads",
                "{{ .Release.Name }}.downloads.svc",
                "{{ .Release.Name }}.downloads.svc.cluster",
                "{{ .Release.Name }}.downloads.svc.cluster.local",
                "localhost:8999"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api?mode=version
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 512Mi
              limits:
                memory: 3Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values: ["qbittorrent"]
                topologyKey: kubernetes.io/hostname
    service:
      app:
        ports:
          http:
            port: *port
    persistence:
      config:
        globalMounts:
          - path: /config
            readOnly: false
        type: persistentVolumeClaim
        storageClass: longhorn
        size: 500Mi
        accessMode: ReadWriteOnce
      media:
        type: nfs
        server: mimir.home
        path: /var/nfs/shared/MEDIA
        globalMounts:
          - subPath: data/usenet
            path: /data/usenet
      tmp:
        type: emptyDir
