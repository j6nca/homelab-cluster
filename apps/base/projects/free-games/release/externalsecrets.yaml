---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &app free-games
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    creationPolicy: Owner
    # this is how the Kind=Secret will look like
    template:
      data:
        DISCORD_WEBHOOK_URL: "{{ .discord_webhook }}"

  dataFrom:
    - extract:
        key: *app
