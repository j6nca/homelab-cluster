# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: free-games
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  dependsOn: []
  interval: 15m
  values:
    controllers:
      free-games:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/gravityctl/free-games
              tag: v0.0.4
            env:
              TZ: "America/Toronto"
              # Epic Games Store
              EPIC_COUNTRY: US
              EPIC_LOCALE: en-US

              ENABLE_STEAM: true
              ENABLE_TWITCH_DROPS: false

              # Per-provider schedules (cron format: second minute hour day month weekday)
              # Epic: daily at noon
              EPIC_SCHEDULE: "0 12 * * *"
              # Steam: daily at noon
              STEAM_SCHEDULE: "0 12 * * *"
              # Twitch drops: daily at noon
              TWITCH_DROPS_SCHEDULE: "0 12 * * *"

              # Path to notification deduplication store (avoids duplicate notifications)
              NOTIFICATION_STORE_PATH: "/data/free-games-store.json"

              # HTTP server address (for /games API routes and redirect handler)
              ADDR: 0.0.0.0:8080

              # Custom Discord emojis per provider (Discord native format: <:name:id>)
              # Leave empty to use built-in emoji (🔶 epic, 🎲 steam, 🟣 twitch)
              EPIC_EMOJI: "<:epicgames:1494914252023267368>"
              STEAM_EMOJI: "<:steam:1494914346281730259>"
              TWITCH_EMOJI: "<:twitchprime:1494914397351448718>"

              # Base URL for desktop-app redirect service (e.g. https://redirect.example.com)
              # When set, adds "Open in App" field linking to this redirect server which
              # forwards to the desktop app (steam://, com.epicgames.launcher://, etc.)
              REDIRECT_BASE_URL: https://freebies.j6n.dev
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}"
            ports:
              - containerPort: &port 8080
                name: http
                protocol: TCP
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    persistence:
      data:
        globalMounts:
          - path: /data
            readOnly: false
        type: persistentVolumeClaim
        storageClass: longhorn
        size: 10Mi
        accessMode: ReadWriteOnce
      tmp:
        type: emptyDir
