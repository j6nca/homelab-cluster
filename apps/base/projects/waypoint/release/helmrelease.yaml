---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app waypoint
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 15m
  dependsOn: []
  values:
    defaultPodOptions:
      securityContext:
        # image runs as its own non-root user; fsGroup fixes PVC ownership
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000

    controllers:
      waypoint:
        containers:
          app:
            image:
              repository: ghcr.io/ctrl-research/waypoint
              tag: 0.0.1
            env:
              TZ: America/Toronto
              WAYPOINT_ADDR: ":8080"
              WAYPOINT_BASE_URL: https://travel.j6n.dev
              WAYPOINT_DATA_DIR: /data
              WAYPOINT_LOCAL_AUTH: "true"
            envFrom:
              # google oauth client (1Password item: waypoint)
              - secretRef:
                  name: *app
            ports:
              - containerPort: &port 8080
                name: http
                protocol: TCP
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 10m
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true

    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 5Gi
        storageClass: longhorn
        globalMounts:
          - path: /data
            readOnly: false
      tmp:
        type: emptyDir

    route:
      app:
        hostnames:
          - travel.j6n.dev
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    service:
      app:
        ports:
          http:
            port: *port
