---
# yaml-language-server: $schema=https://ctrl-research.github.io/k8s-schemas/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &app waypoint
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    creationPolicy: Owner
    # this is how the Kind=Secret will look like
    template:
      data:
        WAYPOINT_GOOGLE_CLIENT_ID: "{{ .google_client_id }}"
        WAYPOINT_GOOGLE_CLIENT_SECRET: "{{ .google_client_secret }}"

  dataFrom:
    - extract:
        key: *app
