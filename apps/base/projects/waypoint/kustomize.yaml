---
# yaml-language-server: $schema=https://ctrl-research.github.io/k8s-schemas/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app waypoint
  namespace: flux-system
spec:
  components:
    - ../../../../../components/postgres
  postBuild:
    substitute:
      APP: *app
      POSTGRES_REPLICAS: "1"
      POSTGRES_SIZE: 1Gi
  targetNamespace: *app
  commonMetadata:
    labels:
      service: *app
  interval: 5m
  path: ./apps/base/projects/waypoint/release
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
