apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app toolhive-crds
  namespace: flux-system
spec:
  targetNamespace: toolhive
  commonMetadata:
    labels:
      service: toolhive
  interval: 5m
  path: ./apps/base/ai/toolhive/crds
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app toolhive
  namespace: flux-system
spec:
  targetNamespace: *app
  commonMetadata:
    labels:
      service: *app
  interval: 5m
  dependsOn:
    - name: toolhive-crds
  path: ./apps/base/ai/toolhive/release
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
