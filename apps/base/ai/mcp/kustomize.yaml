# yaml-language-server: $schema=https://ctrl-research.github.io/k8s-schemas/kustomize.toolkit.fluxcd.io/kustomization_v1.json
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app grafana-mcp
  namespace: flux-system
spec:
  targetNamespace: mcp
  commonMetadata:
    labels:
      service: *app
  interval: 5m
  path: ./apps/base/ai/mcp/grafana
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
