# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app kubernetes-mcp
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  dependsOn: []
  interval: 15m
  values:
    controllers:
      kubernetes-mcp:
        annotations:
          reloader.stakater.com/auto: "true"
        serviceAccount:
          name: kubernetes-mcp
        containers:
          app:
            image:
              repository: ghcr.io/containers/kubernetes-mcp-server
              tag: latest
              pullPolicy: Always
            # Serves Streamable HTTP at /mcp (and SSE at /sse). In-cluster
            # config is auto-detected from the mounted ServiceAccount token.
            # --read-only blocks all mutating operations as defense-in-depth on
            # top of the read-only RBAC.
            args:
              - "--port"
              - "8080"
              - "--read-only"
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            ports:
              - containerPort: &port 8080
                name: http
                protocol: TCP
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
    service:
      app:
        ports:
          http:
            port: *port
