apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: open-webui
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    creationPolicy: Owner
    # this is how the Kind=Secret will look like
    template:
      data:
        # OAUTH CONFIG
        ENABLE_SIGNUP: "false"
        ENABLE_LOGIN_FORM: "false"
        ENABLE_OAUTH_SIGNUP: "true"
        ENABLE_OAUTH_PERSISTENT_CONFIG: "false"
        OAUTH_ROLES_CLAIM: groups
        OAUTH_ADMIN_ROLES: open-webui_admin
        OAUTH_MERGE_ACCOUNTS_BY_EMAIL: "true"
        OAUTH_PROVIDER_NAME: Authentik
        OPENID_PROVIDER_URL: https://auth.j6n.dev/application/o/open-webui/.well-known/openid-configuration
        OAUTH_SCOPES: openid email profile
        OPENID_REDIRECT_URI: https://chat.j6n.dev/oauth/oidc/callback
        OAUTH_CLIENT_ID: "{{ .client_id }}"
        OAUTH_CLIENT_SECRET: "{{ .client_secret }}"
        # API keys aligned positionally with OPENAI_API_BASE_URLS:
        #   1. jarvis (no auth required) → placeholder
        #   2. hermes-agent → API_SERVER_KEY shared with the hermes-agent secret
        OPENAI_API_KEYS: "EMPTY;{{ .hermes_api_key }};{{ .minimax_api_key }}"
  data:
    - secretKey: hermes_api_key
      remoteRef:
        key: hermes-agent
        property: password
    - secretKey: minimax_api_key
      remoteRef:
        key: minimax-api
        property: password
  dataFrom:
    - extract:
        key: open-webui-oidc
