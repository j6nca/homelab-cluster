apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &app hermes-agent
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    creationPolicy: Owner
    # this is how the Kind=Secret will look like
    template:
      data:
        # Discord
        # GH
        GITHUB_PAT: "{{ .gh_pat }}"
        # Other
        OLLAMA_URL: jarvis.home:8000
        MINIMAX_API_KEY: "{{ .MINIMAX_API_KEY }}"
        DISCORD_BOT_TOKEN: "{{ .discord_token }}"
        DISCORD_ALLOWED_USERS: "{{ .discord_user_id }}"
  data:
  - secretKey: gh_pat
    remoteRef:
      key: openclaw-gh
      property: pat
  # Model keys
  - secretKey: MINIMAX_API_KEY
    remoteRef:
      key: minimax-api
      property: password
  # Discord
  - secretKey: discord_server_id
    remoteRef:
      key: discord-hermes-agent-common
      property: discord_server_id
  - secretKey: discord_user_id
    remoteRef:
      key: discord-hermes-agent-common
      property: discord_user_id
  - secretKey: discord_token
    remoteRef:
      key: discord-hermes-agent-common
      property: discord_token
  ## Agent-specific data
  ## General
  - secretKey: discord_channel_jade_id
    remoteRef:
      key: discord-jade
      property: discord_channel_id
  ## Coding
  - secretKey: discord_channel_jarvis_id
    remoteRef:
      key: discord-jarvis
      property: discord_channel_id
