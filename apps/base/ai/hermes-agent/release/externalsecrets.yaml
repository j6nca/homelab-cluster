apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &app hermes-agent
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    creationPolicy: Owner
    # this is how the Kind=Secret will look like
    template:
      data:
        # Discord
        # GH
        GITHUB_PAT: "{{ .gh_pat }}"
        # Other
        OLLAMA_URL: jarvis.home:8000
        MINIMAX_API_KEY: "{{ .MINIMAX_API_KEY }}"
  data:
  - secretKey: gh_pat
    remoteRef:
      key: openclaw-gh
      property: pat
  # Model keys
  - secretKey: MINIMAX_API_KEY
    remoteRef:
      key: minimax-api
      property: password
