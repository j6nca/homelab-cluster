# yaml-language-server: $schema=https://ctrl-research.github.io/k8s-schemas/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &app hermes-agent
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    creationPolicy: Owner
    # this is how the Kind=Secret will look like
    template:
      data:
        # Discord
        # GH
        GITHUB_PAT: "{{ .gh_pat }}"
        # Other
        OLLAMA_URL: jarvis.home:13305
        MINIMAX_API_KEY: "{{ .MINIMAX_API_KEY }}"
        # OpenAI-compatible API server (consumed by open-webui)
        API_SERVER_KEY: "{{ .API_SERVER_KEY }}"
        DISCORD_BOT_TOKEN: "{{ .discord_token }}"
        DISCORD_ALLOWED_USERS: "{{ .discord_user_id }}"
        TELEGRAM_BOT_TOKEN: "{{ .telegram_token }}"
        TELEGRAM_ALLOWED_USERS: "{{ .telegram_user_id }}"
        SLACK_BOT_TOKEN: "{{ .slack_token }}"
        SLACK_ALLOWED_USERS: "{{ .slack_user_id }}"
        SLACK_HOME_CHANNEL_ID: "{{ .slack_channel_home_id }}"
  data:
    - secretKey: gh_pat
      remoteRef:
        key: openclaw-gh
        property: pat
    # Model keys
    - secretKey: MINIMAX_API_KEY
      remoteRef:
        key: minimax-api
        property: password
    # API server key (shared with open-webui)
    - secretKey: API_SERVER_KEY
      remoteRef:
        key: hermes-agent
        property: password
    # Discord
    - secretKey: discord_server_id
      remoteRef:
        key: discord-hermes-agent-common
        property: discord_server_id
    - secretKey: discord_user_id
      remoteRef:
        key: discord-hermes-agent-common
        property: discord_user_id
    - secretKey: discord_token
      remoteRef:
        key: discord-hermes-agent-common
        property: discord_token
    # Telegram
    - secretKey: telegram_token
      remoteRef:
        key: telegram-bot
        property: password
    - secretKey: telegram_user_id
      remoteRef:
        key: telegram-bot
        property: user_id
    ## Agent-specific data
    ## General
    - secretKey: discord_channel_jade_id
      remoteRef:
        key: discord-jade
        property: discord_channel_id
    ## Coding
    - secretKey: discord_channel_jarvis_id
      remoteRef:
        key: discord-jarvis
        property: discord_channel_id
    # Slack
    - secretKey: slack_token
      remoteRef:
        key: slack-hermes-agent
        property: slack_token
    - secretKey: slack_user_id
      remoteRef:
        key: slack-hermes-agent
        property: slack_user_id
    - secretKey: slack_channel_home_id
      remoteRef:
        key: slack-hermes-agent
        property: slack_channel_home_id
