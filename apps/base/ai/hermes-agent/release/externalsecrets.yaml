apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &app hermes-agent
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    creationPolicy: Owner
    # this is how the Kind=Secret will look like
    template:
      data:
        # Discord
        # GH
        GITHUB_PAT: "{{ .gh_pat }}"
        # Other
        OLLAMA_URL: jarvis.home:8000
        MINIMAX_API_KEY: "{{ .MINIMAX_API_KEY }}"
  data:
  - secretKey: gh_pat
    remoteRef:
      key: openclaw-gh
      property: pat
  # Model keys
  - secretKey: MINIMAX_API_KEY
    remoteRef:
      key: minimax-api
      property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &app hermes-agent-config
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    creationPolicy: Owner
    # this is how the Kind=Secret will look like
    template:
      data:
        config.yaml: | 
          model: anthropic/claude-sonnet-4
          terminal:
            backend: local
            timeout: 180
          tools:  
            enabled:
              - bash 
              - glob
              - edit
              - web_search
          memory:
            auto_migrate: true
          compression:
            enabled: true
          gateway:
            port: 8642
  data:
  - secretKey: OPENCLAW_GATEWAY_TOKEN
    remoteRef:
      key: openclaw
      property: OPENCLAW_GATEWAY_TOKEN
  # Discord
  - secretKey: discord_server_id
    remoteRef:
      key: discord-common
      property: discord_server_id
  - secretKey: discord_user_id
    remoteRef:
      key: discord-common
      property: discord_user_id
  - secretKey: discord_token
    remoteRef:
      key: discord-common
      property: discord_token
  ## Agent-specific data
  - secretKey: discord_channel_jade_id
    remoteRef:
      key: discord-jade
      property: discord_channel_id
  - secretKey: discord_channel_jarvis_id
    remoteRef:
      key: discord-jarvis
      property: discord_channel_id
  # Model keys
  - secretKey: MINIMAX_API_KEY
    remoteRef:
      key: minimax-api
      property: password
