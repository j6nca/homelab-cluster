apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app bifrost
spec:
  chart:
    spec:
      chart: *app
      sourceRef:
        kind: HelmRepository
        name: *app
        namespace: flux-system
      version: v2.0.16
  interval: 15m
  commonMetadata:
    labels:
      service: *app
  values:
    image:
      tag: v1.4.20
    storage:
      persistence:
        size: 1Gi
