apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bifrost
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    creationPolicy: Owner
    # this is how the Kind=Secret will look like
    template:
      data:
        MINIMAX_API_KEY: "{{ .minimax_api_key }}"
        HERMES_AGENT_API_KEY: "{{ .hermes_api_key }}"
  data:
    - secretKey: hermes_api_key
      remoteRef:
        key: hermes-agent
        property: password
    - secretKey: minimax_api_key
      remoteRef:
        key: minimax-api
        property: password
