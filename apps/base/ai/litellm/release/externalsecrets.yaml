apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    creationPolicy: Owner
    # this is how the Kind=Secret will look like
    template:
      data:
        MINIMAX_API_KEY: "{{ .minimax_api_key }}"
        HERMES_AGENT_API_KEY: "{{ .hermes_api_key }}"
        OPENCODE_GO_API_KEY: "{{ .opencode_go_api_key }}"
        LITELLM_MASTER_KEY: "{{ .litellm_master_key }}"
        # --- Admin UI SSO (generic OAuth/OIDC via Authentik) ---
        # Browser does the redirect round-trip, so PROXY_BASE_URL must be the
        # externally reachable UI host. Register {PROXY_BASE_URL}/sso/callback as
        # the redirect URI on the Authentik provider.
        PROXY_BASE_URL: https://ai.j6n.dev
        GENERIC_CLIENT_ID: "{{ .client_id }}"
        GENERIC_CLIENT_SECRET: "{{ .client_secret }}"
        GENERIC_AUTHORIZATION_ENDPOINT: https://auth.j6n.dev/application/o/authorize/
        GENERIC_TOKEN_ENDPOINT: https://auth.j6n.dev/application/o/token/
        GENERIC_USERINFO_ENDPOINT: https://auth.j6n.dev/application/o/userinfo/
        GENERIC_SCOPE: openid email profile
        GENERIC_USER_ID_ATTRIBUTE: sub
        GENERIC_USER_EMAIL_ATTRIBUTE: email
        GENERIC_USER_DISPLAY_NAME_ATTRIBUTE: name
        # Authentik must emit this claim with a literal LiteLLM role value
        # (proxy_admin | proxy_admin_viewer | internal_user | internal_user_view_only).
        GENERIC_USER_ROLE_ATTRIBUTE: litellm_role
  data:
    - secretKey: hermes_api_key
      remoteRef:
        key: hermes-agent
        property: password
    - secretKey: minimax_api_key
      remoteRef:
        key: minimax-api
        property: password
    - secretKey: opencode_go_api_key
      remoteRef:
        key: opencode-go
        property: password
    - secretKey: litellm_master_key
      remoteRef:
        key: litellm
        property: master_key
  # OIDC client credentials live in the `litellm-oidc` 1Password item
  # (fields: client_id, client_secret), mirroring `open-webui-oidc`.
  dataFrom:
    - extract:
        key: litellm-oidc
