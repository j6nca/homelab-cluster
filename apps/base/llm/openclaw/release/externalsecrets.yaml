apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &app openclaw
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    creationPolicy: Owner
    # this is how the Kind=Secret will look like
    template:
      data:
        # Discord
        # GH
        # Other
        OLLAMA_URL: jarvis.home:11434
        OPENCLAW_GATEWAY_TOKEN: "{{ .OPENCLAW_GATEWAY_TOKEN }}"
  dataFrom:
    - extract:
        key: *app
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &app openclaw-config
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    creationPolicy: Owner
    # this is how the Kind=Secret will look like
    template:
      data:
        openclaw.json: | 
          {
            "auth": {
              "profiles": {
                "ollama:default": {
                  "provider": "ollama",
                  "mode": "api_key"
                }
              }
            },
            "models": {
              "mode": "merge",
              "providers": {
                "ollama": {
                  "baseUrl": "http://jarvis.home:11434",
                  "apiKey": "OLLAMA_API_KEY",
                  "api": "ollama",
                  "models": [
                    {
                      "id": "glm-4.7-flash",
                      "name": "glm-4.7-flash",
                      "reasoning": false,
                      "input": [
                        "text"
                      ],
                      "cost": {
                        "input": 0,
                        "output": 0,
                        "cacheRead": 0,
                        "cacheWrite": 0
                      },
                      "contextWindow": 128000,
                      "maxTokens": 8192
                    },
                    {
                      "id": "glm-4.7-flash:latest",
                      "name": "glm-4.7-flash:latest",
                      "reasoning": false,
                      "input": [
                        "text"
                      ],
                      "cost": {
                        "input": 0,
                        "output": 0,
                        "cacheRead": 0,
                        "cacheWrite": 0
                      },
                      "contextWindow": 202752,
                      "maxTokens": 8192
                    }
                  ]
                }
              }
            },
            "agents": {
              "defaults": {
                "model": {
                  "primary": "ollama/glm-4.7-flash"
                },
                "models": {
                  "ollama/glm-4.7-flash": {}
                },
                "workspace": "/home/node/.openclaw/workspaces/main"
              },
              "list": [
                {
                  "id": "main",
                  "name": "main",
                  "workspace": "/home/node/.openclaw/workspaces/main",
                  "agentDir": "/home/node/.openclaw/agents/main/agent"
                },
                {
                  "id": "jade",
                  "name": "jade",
                  "workspace": "/home/node/.openclaw/workspaces/jade",
                  "agentDir": "/home/node/.openclaw/agents/jade/agent"
                }
              ]
            },
            "tools": {
              "profile": "coding"
            },
            "commands": {
              "native": "auto",
              "nativeSkills": "auto",
              "restart": true,
              "ownerDisplay": "raw"
            },
            "session": {
              "dmScope": "per-channel-peer"
            },
            "channels": {
              "discord": {
                "enabled": true,
                "token": "{{ .discord_token }}",
                "groupPolicy": "allowlist",
                guilds: {
                  "{{ .discord_server_id }}": {
                    requireMention: true,
                    users: ["{{ .discord_user_id }}"],
                  },
                },
                "streaming": "off"
              }
            },
            bindings: [
              {
                agentId: "jade",
                match: {
                  channel: "discord",
                  guildId: "{{ .discord_server_id }}",
                  roles: ["{{ .discord_role_jade_id }}"],
                },
              },
            ],
            "gateway": {
              "port": 18789,
              "mode": "local",
              "bind": "loopback",
              "auth": {
                "mode": "token",
                "token": "{{ .OPENCLAW_GATEWAY_TOKEN }}"
              },
              "tailscale": {
                "mode": "off",
                "resetOnExit": false
              },
              "nodes": {
                "denyCommands": [
                  "camera.snap",
                  "camera.clip",
                  "screen.record",
                  "contacts.add",
                  "calendar.add",
                  "reminders.add",
                  "sms.send"
                ]
              }
            }
          }
  data:
  - secretKey: OPENCLAW_GATEWAY_TOKEN
    remoteRef:
      key: openclaw
      property: OPENCLAW_GATEWAY_TOKEN
  - secretKey: discord_server_id
    remoteRef:
      key: discord-common
      property: discord_server_id
  - secretKey: discord_user_id
    remoteRef:
      key: discord-common
      property: discord_user_id
  - secretKey: discord_token
    remoteRef:
      key: discord-common
      property: discord_token
  # Agent-specific data
  - secretKey: discord_role_jade_id
    remoteRef:
      key: discord-jade
      property: discord_role_id
