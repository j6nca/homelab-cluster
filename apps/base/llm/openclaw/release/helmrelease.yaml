apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app openclaw
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  dependsOn: []
  interval: 15m
  values:
    controllers:
      openclaw:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.3.24
            env:
              TZ: &tz America/Toronto
              OPENCLAW_GATEWAY_PORT: &port 18789
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}"
            resources:
              requests:
                cpu: 500m
              limits:
                memory: 2Gi
            ports:
              - containerPort: *port
                name: http
                protocol: TCP
    defaultPodOptions:
      shareProcessNamespace: true
      securityContext:
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    persistence:
      config:
        type: persistentVolumeClaim
        storageClass: longhorn
        size: 100M
        accessMode: ReadWriteOnce
        globalMounts:
          - path: /home/node/.openclaw
      # Mount secret to config file
      openclaw-config:
        type: secret
        name: "{{ .Release.Name }}-config"
        defaultMode: 0400
        globalMounts:
          - path: /home/node/.openclaw/openclaw.json
            subPath: openclaw.json
      # Workspace data
      workspace:
        type: nfs
        server: mimir.home
        path: /var/nfs/shared/LLM
        globalMounts:
          - subPath: openclaw/workspaces
            path: /home/node/.openclaw/workspaces
