# yaml-language-server: $schema=https://ctrl-research.github.io/k8s-schemas/gateway.envoyproxy.io/envoyproxy_v1alpha1.json
# Pin the generated proxy Service names (default is an autogenerated
# envoy-<ns>-<gateway>-<hash> name) so cloudflared and DNS can target them.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: envoy-external
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        # only the in-cluster cloudflared tunnel talks to this gateway
        name: envoy-external
        type: ClusterIP
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: envoy-internal
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        name: envoy-internal
        type: LoadBalancer
        annotations:
          # TODO(user): confirm pinned LAN IP (must be inside the MetalLB pool)
          metallb.io/loadBalancerIPs: 192.168.1.240
